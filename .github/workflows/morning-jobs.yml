name: morning-jobs

on:
  schedule:
    # GitHub cron is UTC. 12:30 UTC = 5:30 AM Pacific during PDT (summer).
    # In winter (PST) it arrives at 4:30 AM; switch to "30 13 * * *" then,
    # or accept the one-hour seasonal drift.
    - cron: "30 12 * * *"
  workflow_dispatch: {}   # run on demand from the Actions tab

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5   # Node 24, no deprecation warning
      - name: Pull hot jobs and push notification
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          MAX_YEARS: "4"
          JOB_WINDOW_HOURS: "48"
          US_ONLY: "true"
          # INCLUDE_TITLES: "software engineer,swe,sde,backend engineer,engineer ii,se2"
          # EXCLUDE_TITLES: "senior,staff,principal,lead,manager,director,iii,iv"
          # NOTIFY_WHEN_EMPTY: "false"
        run: python3 morning_jobs.py   # runner's preinstalled Python 3; script is stdlib-only
